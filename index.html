<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Delivery App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🍕 QuickBite Auto reply - This will work fine if you connect an LLM with 10billion reasoning characters</h1>
        <div id="location" style="margin: 5px 0; font-size: 14px;">📍 Getting location...</div>
        <input type="text" id="search" placeholder="Search for food...">
    </header>

    <main>
        <section class="categories">
            <button class="category active" data-category="all">All</button>
            <button class="category" data-category="pizza">Pizza</button>
            <button class="category" data-category="burger">Burgers</button>
            <button class="category" data-category="sushi">Sushi</button>
        </section>

        <section class="food-grid" id="foodGrid"></section>
    </main>

    <div class="cart" id="cart">
        <h3>Cart (<span id="cartCount">0</span>)</h3>
        <div id="cartItems"></div>
        <div class="cart-total">
            <strong>Total: $<span id="total">0.00</span></strong>
            <button id="checkout">Checkout</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
